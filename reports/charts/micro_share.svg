<line x1="76" y1="102.7" x2="736" y2="102.7" class="grid"/>
<text x="68" y="106.7" font-size="11" text-anchor="end" class="mut">15.1</text>
<line x1="76" y1="52.0" x2="736" y2="52.0" class="grid"/>
<text x="68" y="56.0" font-size="11" text-anchor="end" class="mut">15.9</text>
<polyline points="76.0,89.8 208.0,66.7 340.0,77.4 472.0,81.5 604.0,108.2 736.0,189.3" class="line"/>
