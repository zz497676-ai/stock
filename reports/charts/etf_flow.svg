<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 240" width="760" role="img">
<title>全市场ETF份额日变动(公募申赎代理)</title>

  <style>
    text { font-family: system-ui, -apple-system, "Segoe UI", "PingFang SC",
           "Microsoft YaHei", sans-serif; fill: #0b0b0b; }
    .sec { fill: #52514e; } .mut { fill: #898781; }
    .grid { stroke: #e1e0d9; stroke-width: 1; }
    .axis { stroke: #c3c2b7; stroke-width: 1; }
    .inflow { fill: #e34948; } .outflow { fill: #2a78d6; }
    .neutral { fill: #f0efec; }
    .line { stroke: #2a78d6; stroke-width: 2; fill: none;
            stroke-linejoin: round; stroke-linecap: round; }
    .dot { fill: #2a78d6; stroke: #fcfcfb; stroke-width: 2; }
    .surface { fill: #fcfcfb; }
    @media (prefers-color-scheme: dark) {
      text { fill: #ffffff; }
      .sec { fill: #c3c2b7; } .mut { fill: #898781; }
      .grid { stroke: #2c2c2a; } .axis { stroke: #383835; }
      .inflow { fill: #e66767; } .outflow { fill: #3987e5; }
      .neutral { fill: #383835; }
      .line { stroke: #3987e5; }
      .dot { fill: #3987e5; stroke: #1a1a19; }
      .surface { fill: #1a1a19; }
    }
  </style>
<rect x="0" y="0" width="760" height="240" class="surface" rx="8"/>
<text x="20" y="30" font-size="16" font-weight="600">全市场ETF份额日变动(公募申赎代理)</text>
<text x="740" y="30" font-size="12" text-anchor="end" class="mut">亿份</text>
<line x1="76" y1="204.0" x2="736" y2="204.0" class="grid"/>
<text x="68" y="208.0" font-size="11" text-anchor="end" class="mut">-120.0</text>
<line x1="76" y1="153.3" x2="736" y2="153.3" class="grid"/>
<text x="68" y="157.3" font-size="11" text-anchor="end" class="mut">278.8</text>
<line x1="76" y1="102.7" x2="736" y2="102.7" class="grid"/>
<text x="68" y="106.7" font-size="11" text-anchor="end" class="mut">677.7</text>
<line x1="76" y1="52.0" x2="736" y2="52.0" class="grid"/>
<text x="68" y="56.0" font-size="11" text-anchor="end" class="mut">1,076.6</text>
<polyline points="76.0,189.3 241.0,164.8 406.0,176.3 571.0,66.7 736.0,187.1" class="line"/>
<circle cx="736.0" cy="187.1" r="5" class="dot"/>
<text x="736.0" y="175.1" font-size="12" font-weight="600" text-anchor="end">12.7</text>
<text x="76" y="228" font-size="10" class="mut">2026-07-16</text>
<text x="736" y="228" font-size="10" text-anchor="end" class="mut">2026-07-22</text></svg>
