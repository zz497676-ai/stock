<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 298" width="760" role="img">
<title>七类资金动向矩阵</title>

  <style>
    text { font-family: system-ui, -apple-system, "Segoe UI", "PingFang SC",
           "Microsoft YaHei", sans-serif; fill: #0b0b0b; }
    .sec { fill: #52514e; } .mut { fill: #898781; }
    .grid { stroke: #e1e0d9; stroke-width: 1; }
    .axis { stroke: #c3c2b7; stroke-width: 1; }
    .inflow { fill: #e34948; } .outflow { fill: #2a78d6; }
    .neutral { fill: #f0efec; }
    .line { stroke: #2a78d6; stroke-width: 2; fill: none;
            stroke-linejoin: round; stroke-linecap: round; }
    .dot { fill: #2a78d6; stroke: #fcfcfb; stroke-width: 2; }
    .surface { fill: #fcfcfb; }
    @media (prefers-color-scheme: dark) {
      text { fill: #ffffff; }
      .sec { fill: #c3c2b7; } .mut { fill: #898781; }
      .grid { stroke: #2c2c2a; } .axis { stroke: #383835; }
      .inflow { fill: #e66767; } .outflow { fill: #3987e5; }
      .neutral { fill: #383835; }
      .line { stroke: #3987e5; }
      .dot { fill: #3987e5; stroke: #1a1a19; }
      .surface { fill: #1a1a19; }
    }
  </style>
<rect x="0" y="0" width="760" height="298" class="surface" rx="8"/>
<text x="20" y="30" font-size="16" font-weight="600">动向矩阵 · 近2个交易日</text>
<text x="740" y="30" font-size="12" text-anchor="end" class="mut">红=流入 蓝=流出 灰=中性/缺数据</text>
<text x="138" y="73.0" font-size="13" text-anchor="end">国家队</text>
<rect x="150.0" y="56" width="24.0" height="26" rx="3" class="neutral" opacity="1.0"/>
<rect x="176.0" y="56" width="24.0" height="26" rx="3" class="neutral" opacity="1.0"/>
<text x="138" y="101.0" font-size="13" text-anchor="end">险资与社保</text>
<rect x="150.0" y="84" width="24.0" height="26" rx="3" class="neutral" opacity="1.0"/>
<rect x="176.0" y="84" width="24.0" height="26" rx="3" class="neutral" opacity="1.0"/>
<text x="138" y="129.0" font-size="13" text-anchor="end">公募基金(附:主观私募)</text>
<rect x="150.0" y="112" width="24.0" height="26" rx="3" class="neutral" opacity="1.0"/>
<rect x="176.0" y="112" width="24.0" height="26" rx="3" class="neutral" opacity="1.0"/>
<text x="138" y="157.0" font-size="13" text-anchor="end">量化资金</text>
<rect x="150.0" y="140" width="24.0" height="26" rx="3" class="neutral" opacity="1.0"/>
<rect x="176.0" y="140" width="24.0" height="26" rx="3" class="neutral" opacity="1.0"/>
<text x="138" y="185.0" font-size="13" text-anchor="end">游资</text>
<rect x="150.0" y="168" width="24.0" height="26" rx="3" class="inflow" opacity="0.55"/>
<rect x="176.0" y="168" width="24.0" height="26" rx="3" class="neutral" opacity="1.0"/>
<text x="138" y="213.0" font-size="13" text-anchor="end">产业资本</text>
<rect x="150.0" y="196" width="24.0" height="26" rx="3" class="neutral" opacity="1.0"/>
<rect x="176.0" y="196" width="24.0" height="26" rx="3" class="neutral" opacity="1.0"/>
<text x="138" y="241.0" font-size="13" text-anchor="end">普通散户</text>
<rect x="150.0" y="224" width="24.0" height="26" rx="3" class="outflow" opacity="0.55"/>
<rect x="176.0" y="224" width="24.0" height="26" rx="3" class="outflow" opacity="0.55"/>
<text x="150.0" y="280" font-size="10" text-anchor="start" class="mut">07-15</text>
<text x="200.0" y="280" font-size="10" text-anchor="end" class="mut">07-16</text></svg>
