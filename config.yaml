# A股八类资金监控 配置文件

# 国家队(汇金/证金)历史上用于护盘的宽基 ETF
national_team_etfs:
  - code: "510300"
    name: "华泰柏瑞沪深300ETF"
  - code: "510050"
    name: "华夏上证50ETF"
  - code: "510500"
    name: "南方中证500ETF"
  - code: "159919"
    name: "嘉实沪深300ETF"
  - code: "588000"
    name: "华夏科创50ETF"
  - code: "512100"
    name: "南方中证1000ETF"

# ETF 成交额相对 20 日均值的放量倍数,超过即视为异动
national_team_volume_ratio_threshold: 2.0

# 龙虎榜营业部识别关键词
hot_money_seats:
  # 知名一线游资常用营业部。空格分段匹配:营业部全名需同时包含所有分段
  # (真实名称含"股份有限公司"等中缀,如"华鑫证券有限责任公司上海分公司")
  famous_keywords:
    - "华鑫证券 上海分公司"
    - "国泰君安 上海江苏路"
    - "银河证券 绍兴"
    - "财通证券 杭州上塘路"
    - "国盛证券 宁波桑田路"
    - "东方证券 源深路"
    - "中信证券 溧阳路"
    - "华泰证券 益田路荣超商务中心"
    - "招商证券 蛇口工业七路"
    - "国泰君安 南京太平南路"
    - "湘财证券 陆家嘴"
    - "东吴证券 苏州西北街"
    - "中金财富 杭州教工路"
    - "华福证券 天津华昌道"
    - "东莞证券 北京分公司"
    - "中泰证券 深圳欢乐海岸"
    - "方正证券 杭州延安路"
    - "国信证券 深圳振华路"
  # 拉萨天团 = 东方财富旗下拉萨营业部,是全国散户网上开户通道,视为散户情绪指标
  retail_keywords:
    - "拉萨"

# 险资/社保 公告扫描关键词(匹配"持股变动"类公告标题)
insurance_keywords:
  - "举牌"
  - "人寿"
  - "平安"
  - "太保"
  - "泰康"
  - "新华保险"
  - "阳光人寿"
  - "信泰人寿"
  - "长城人寿"
  - "瑞众人寿"
  - "保险"
  - "社保基金"

# 异动判断的历史均值窗口(交易日)
lookback_days: 20

# 个股事件(供网页个股查询)保留的日历天数,超出自动截断防止文件无限增长
stock_events_days: 120

# 个股资金流(散户代理)只记录当日活跃股: 有游资/产业资本/险资事件的股票,
# 外加按 |主力净流入| 排名前 N 的股票
stock_flow_top_n: 150

# 数据与报告输出目录
data_dir: "data"
reports_dir: "reports"
