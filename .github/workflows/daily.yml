name: 每日资金动向日报

on:
  schedule:
    # UTC 10:30 = 北京时间 18:30,周一至周五(非交易日由脚本自行跳过)
    - cron: "30 10 * * 1-5"
  workflow_dispatch:
    inputs:
      date:
        description: "补跑日期 YYYYMMDD(留空=当天)"
        required: false
        default: ""

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 生成日报
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="--date ${{ github.event.inputs.date }} --skip-calendar"
          fi
          python src/main.py $ARGS

      - name: 提交结果
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data reports docs README.md
          if git diff --cached --quiet; then
            echo "无变更(非交易日或数据未更新),跳过提交。"
          else
            git commit -m "日报: $(date -u -d '+8 hours' +%F)"
            git push
          fi

  deploy-pages:
    needs: report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
